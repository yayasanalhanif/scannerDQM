<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Kehadiran Peserta DQM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* TEMA TERANG (LIGHT MODE) */
        body { 
            background: #f4f7f6; /* Abu-abu sangat terang */
            color: #1e293b; 
            font-family: 'Orbitron', sans-serif; 
            overflow-x: hidden; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
        }
        
        /* WADAH JUDUL */
        .title-wrapper {
            background: #ffffff;
            border-bottom: 4px solid #2563eb;
            padding: 50px 15px; 
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* EFEK JUDUL TERBELAH */
        h2.split-title {
            margin: 0 auto; 
            padding: 0;
            position: relative;
            display: inline-block;
            font-size: 3.5rem; 
            color: transparent; /* Teks asli dibuat transparan */
            text-transform: uppercase;
            font-family: Consolas, monospace; /* Sesuai request efek */
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Teks Penyangga (Agar tinggi container tidak 0) */
        .base-text {
            visibility: hidden; 
        }

        h2.split-title span:nth-child(2) {
            position: absolute;
            top: 0; left: 0; right: 0;
            color: #000; /* Warna hitam */
            transition: 0.5s;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            overflow: hidden;
        }
        h2.split-title:hover span:nth-child(2) {
            transform: translateY(-18px); 
        }
        
        h2.split-title span:nth-child(3) {
            position: absolute;
            top: 0; left: 0; right: 0;
            color: #000; 
            transition: 0.5s;
            clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
            overflow: hidden;
        }
        h2.split-title:hover span:nth-child(3) {
            transform: translateY(18px); 
        }
        
        h2.split-title span:nth-child(4) {
            position: absolute;
            top: 50%; left: 0; right: 0;
            transform: translateY(-50%) scaleY(0);
            width: 95%; 
            margin: 0 auto;
            color: #000;
            background: #ff0; /* Kuning cerah */
            font-size: 0.25em; 
            font-weight: 800;
            letter-spacing: 0.7em;
            text-align: center;
            transition: 0.5s;
            padding: 5px 0;
        }
        h2.split-title:hover span:nth-child(4) {
            transform: translateY(-50%) scaleY(1);
        }

        /* GAYA TABEL TEMA TERANG */
        .glass { background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; }
        .table { color: #334155 !important; font-size: 0.9rem; }
        .table thead { color: #2563eb; border-bottom: 2px solid #2563eb; font-weight: bold; }
        .table-hover tbody tr:hover { background-color: #f1f5f9; }

        /* ANIMASI TEKS JATUH (Diaplikasikan HANYA ke Teks, bukan Baris) */
        @keyframes textDropRoll {
            0% {
                opacity: 0;
                transform: translateX(-30px) rotate(-25deg);
            }
            50% {
                opacity: 1;
                transform: translateX(0px) rotate(5deg);
            }
            100% {
                opacity: 1;
                transform: translateX(0px) rotate(0deg);
            }
        }
        
        /* Pembungkus teks di dalam sel tabel */
        .teks-jatuh {
            display: inline-block;
            opacity: 0; /* Awalnya tidak terlihat */
            transform-origin: left bottom;
            animation: textDropRoll 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

    </style>
</head>
<body class="p-2">
    <div class="container-fluid">
        
        <div class="title-wrapper">
            <h2 class="split-title">
                <div class="base-text">DAFTAR KEHADIRAN</div> <span>DAFTAR KEHADIRAN</span>
                <span>DAFTAR KEHADIRAN</span>
                <span>PESERTA DAUROH</span>
            </h2>
        </div>

        <div class="glass p-4 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>WAKTU</th>
                            <th>ID PESERTA</th>
                            <th>NAMA PESERTA</th>
                        </tr>
                    </thead>
                    <tbody id="live-data"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const API_URL = "https://script.google.com/macros/s/AKfycbynIfrRtmKorvPGNg_S_2qf1_rijMiMJBYS779ter6Vg8kpEAqOcHUOCYQBr9JtA9LKaQ/exec?action=getData";

            async function fetchJSONP(url) {
                return new Promise((resolve, reject) => {
                    const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                    window[callbackName] = (data) => {
                        delete window[callbackName];
                        document.body.removeChild(script);
                        resolve(data);
                    };
                    const script = document.createElement('script');
                    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
                    document.body.appendChild(script);
                    script.onerror = () => reject("Gagal memuat JSONP");
                });
            }

            async function updateTable() {
                try {
                    const data = await fetchJSONP(API_URL);
                    const tbody = document.getElementById('live-data');
                    if (!tbody) return;

                    let html = "";
                    data.slice(0, 100).forEach((row, index) => {
                        let waktu = new Date(row[0]);
                        let jam = "N/A";
                        if (!isNaN(waktu.getTime())) {
                            let dd = String(waktu.getDate()).padStart(2, '0');
                            let mm = String(waktu.getMonth() + 1).padStart(2, '0');
                            let yyyy = waktu.getFullYear();
                            let hh = String(waktu.getHours()).padStart(2, '0');
                            let min = String(waktu.getMinutes()).padStart(2, '0');
                            let ss = String(waktu.getSeconds()).padStart(2, '0');
                            jam = `${dd}/${mm}/${yyyy} ${hh}:${min}:${ss}`;
                        }
                        
                        // KUNCI: Animasi diterapkan ke dalam <div> teks-jatuh, bukan <tr>
                        // Delay bertambah sedikit demi sedikit per sel
                        let delayBase = index * 0.15; 
                        
                        html += `<tr>
                            <td class="text-secondary" style="font-size: 0.8rem;">
                                <div class="teks-jatuh" style="animation-delay: ${delayBase}s">${jam}</div>
                            </td>
                            <td class="fw-bold text-primary">
                                <div class="teks-jatuh" style="animation-delay: ${delayBase + 0.05}s">${row[1] || '-'}</div>
                            </td>
                            <td class="text-truncate" style="max-width: 200px;">
                                <div class="teks-jatuh" style="animation-delay: ${delayBase + 0.1}s">${row[2] || '-'}</div>
                            </td>
                        </tr>`;
                    });
                    
                    tbody.innerHTML = html;
                } catch (err) {
                    console.error("Terjadi kesalahan:", err);
                }
            }
            
            setInterval(updateTable, 5000); 
            updateTable();
        });
    </script>
</body>
</html>
