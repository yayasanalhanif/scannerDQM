<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Kehadiran Peserta DQM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #050a14; 
            color: #e2e8f0; 
            font-family: 'Orbitron', sans-serif; 
            overflow-x: hidden; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
        }
        
        /* WADAH JUDUL */
        .title-wrapper {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2) 0%, rgba(56, 189, 248, 0.1) 100%);
            border-bottom: 3px solid #0ea5e9;
            padding: 30px 15px; /* Padding diperbesar agar animasi tidak terpotong */
            margin-bottom: 20px;
            text-align: center;
        }

        /* ANIMASI JUDUL TERBELAH (ADAPTASI) */
        h2.split-title {
            margin: 0 auto; 
            padding: 0;
            position: relative;
            display: inline-block;
            font-size: 3rem; /* Disesuaikan agar muat di layar */
            color: transparent;
            text-transform: uppercase;
            cursor: pointer;
            height: 1.2em;
        }
        
        h2.split-title span:nth-child(1) {
            position: absolute;
            top: 0; left: 0; right: 0;
            color: #fff; /* Diubah jadi putih */
            transition: 0.5s;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            overflow: hidden;
        }
        h2.split-title:hover span:nth-child(1) {
            transform: translateY(-15px); 
        }
        
        h2.split-title span:nth-child(2) {
            position: absolute;
            top: 0; left: 0; right: 0;
            color: #fff; /* Diubah jadi putih */
            transition: 0.5s;
            clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
            overflow: hidden;
        }
        h2.split-title:hover span:nth-child(2) {
            transform: translateY(15px); 
        }
        
        h2.split-title span:nth-child(3) {
            position: absolute;
            top: 50%; left: 0;
            transform: translateY(-50%) scaleY(0);
            width: 100%; 
            color: #050a14;
            background: #0ea5e9; /* Disesuaikan tema */
            font-size: 0.25em; 
            font-weight: 800;
            letter-spacing: 0.5em;
            text-align: center;
            transition: 0.5s;
        }
        h2.split-title:hover span:nth-child(3) {
            transform: translateY(-50%) scaleY(1);
        }

        /* GAYA TABEL UTAMA */
        .glass { background: rgba(17, 24, 39, 0.8); border: 1px solid #334155; border-radius: 5px; }
        .table { color: #fff !important; font-size: 0.85rem; }
        .table thead { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; }
        .table-responsive { overflow-x: auto; overflow-y: hidden; }

        /* ANIMASI TABEL JATUH BERPUTAR (ADAPTASI DROPPING TEXT) */
        @keyframes tableRoll {
            0% {
                opacity: 0;
                margin-left: -30px;
                transform: translateY(-30px) rotate(-15deg);
            }
            60% {
                opacity: 1;
                margin-left: 0px;
                transform: translateY(5px) rotate(2deg);
            }
            100% {
                opacity: 1;
                margin-left: 0px;
                transform: translateY(0) rotate(0deg);
            }
        }
        
        .row-new {
            opacity: 0; /* Sembunyikan awal sebelum animasi berjalan */
            /* Menggunakan animasi adaptasi dari 'roll' */
            animation: tableRoll 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

    </style>
</head>
<body class="p-2">
    <div class="container-fluid">
        
        <div class="title-wrapper">
            <h2 class="split-title">
                <span>DAFTAR KEHADIRAN</span>
                <span>DAFTAR KEHADIRAN</span>
                <span>PESERTA DAUROH</span>
            </h2>
        </div>

        <div class="glass p-3 shadow-lg">
            <div class="table-responsive">
                <table class="table table-hover table-sm">
                    <thead>
                        <tr><th>WAKTU</th><th>ID</th><th>NAMA PESERTA</th></tr>
                    </thead>
                    <tbody id="live-data"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const API_URL = "https://script.google.com/macros/s/AKfycbynIfrRtmKorvPGNg_S_2qf1_rijMiMJBYS779ter6Vg8kpEAqOcHUOCYQBr9JtA9LKaQ/exec?action=getData";

            async function fetchJSONP(url) {
                return new Promise((resolve, reject) => {
                    const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                    window[callbackName] = (data) => {
                        delete window[callbackName];
                        document.body.removeChild(script);
                        resolve(data);
                    };
                    const script = document.createElement('script');
                    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
                    document.body.appendChild(script);
                    script.onerror = () => reject("Gagal memuat JSONP");
                });
            }

            async function updateTable() {
                try {
                    const data = await fetchJSONP(API_URL);
                    const tbody = document.getElementById('live-data');
                    if (!tbody) return;

                    let html = "";
                    // Menambahkan index pada forEach untuk membuat delay berurutan
                    data.slice(0, 100).forEach((row, index) => {
                        let waktu = new Date(row[0]);
                        let jam = "N/A";
                        if (!isNaN(waktu.getTime())) {
                            let dd = String(waktu.getDate()).padStart(2, '0');
                            let mm = String(waktu.getMonth() + 1).padStart(2, '0');
                            let yyyy = waktu.getFullYear();
                            let hh = String(waktu.getHours()).padStart(2, '0');
                            let min = String(waktu.getMinutes()).padStart(2, '0');
                            let ss = String(waktu.getSeconds()).padStart(2, '0');
                            jam = `${dd}/${mm}/${yyyy} ${hh}:${min}:${ss}`;
                        }
                        
                        // Menambahkan style animation-delay agar jatuh bergantian seperti efek aslinya
                        let delay = index * 0.1; // Selisih 0.1 detik antar baris
                        
                        html += `<tr class="row-new" style="animation-delay: ${delay}s">
                            <td style="font-size: 0.75rem;">${jam}</td>
                            <td class="fw-bold">${row[1] || '-'}</td>
                            <td class="text-truncate" style="max-width: 150px;">${row[2] || '-'}</td>
                        </tr>`;
                    });
                    
                    tbody.innerHTML = html;
                } catch (err) {
                    console.error("Terjadi kesalahan:", err);
                }
            }
            
            // Interval refresh diatur agar tidak bertabrakan dengan durasi panjang animasi
            setInterval(updateTable, 5000); 
            updateTable();
        });
    </script>
</body>
</html>
