<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Kehadiran Peserta DQM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050a14; color: #e2e8f0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        
        .title-wrapper {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2) 0%, rgba(56, 189, 248, 0.1) 100%);
            border-bottom: 3px solid #0ea5e9;
            padding: 15px;
            margin-bottom: 20px;
        }

        .glass { background: rgba(17, 24, 39, 0.8); border: 1px solid #334155; border-radius: 5px; }
        
        .table { color: #fff !important; font-size: 0.85rem; }
        .table thead { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; }
        .table-responsive { overflow-x: auto; }
        h2 { font-size: 1.25rem; margin: 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes highlight {
            0% { background-color: rgba(14, 165, 233, 0.3); }
            100% { background-color: transparent; }
        }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .row-new { animation: highlight 1.5s ease-out; }

        /* Kelas untuk membungkus teks */
        .tali-berayun {
            display: inline-block;
            font-size: 32px; /* Sesuaikan ukuran teks Om */
            font-weight: bold;
            color: #3b82f6;
        }
        
        /* Memecah setiap huruf agar bisa dianimasikan terpisah */
        .tali-berayun span {
            display: inline-block;
            opacity: 0;
            /* Titik tumpu ayunan ada di atas (seperti tali digantung) */
            transform-origin: top left; 
            /* Panggil animasi 'swingDrop' */
            animation: swingDrop 1s ease-out forwards;
        }
        
        /* Keyframes untuk efek jatuh berayun (seperti bandul/tali) */
        @keyframes swingDrop {
            0% {
                opacity: 0;
                transform: rotateZ(-90deg); /* Terlipat ke atas */
            }
            40% {
                opacity: 1;
                transform: rotateZ(20deg); /* Jatuh kelewat batas (efek pantulan) */
            }
            70% {
                transform: rotateZ(-10deg); /* Mengayun balik sedikit */
            }
            100% {
                opacity: 1;
                transform: rotateZ(0deg); /* Berhenti di posisi normal (lurus) */
            }
        }
    </style>
</head>
<body class="p-2">
    <div class="container-fluid">
        <div class="title-wrapper text-center">
            <h2 class="text-uppercase">DAFTAR KEHADIRAN PESERTA DAUROH</h2>
        </div>
        <div class="tali-berayun" id="teks-dashboard">SELAMAT DATANG DI DASHBOARD</div>

        <div class="glass p-3 shadow-lg">
            <div class="table-responsive">
                <table class="table table-hover table-sm">
                    <thead>
                        <tr><th>WAKTU</th><th>ID</th><th>NAMA PESERTA</th></tr>
                    </thead>
                    <tbody id="live-data"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const API_URL = "https://script.google.com/macros/s/AKfycbynIfrRtmKorvPGNg_S_2qf1_rijMiMJBYS779ter6Vg8kpEAqOcHUOCYQBr9JtA9LKaQ/exec?action=getData";

            async function fetchJSONP(url) {
                return new Promise((resolve, reject) => {
                    const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                    window[callbackName] = (data) => {
                        delete window[callbackName];
                        document.body.removeChild(script);
                        resolve(data);
                    };
                    const script = document.createElement('script');
                    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
                    document.body.appendChild(script);
                    script.onerror = () => reject("Gagal memuat JSONP");
                });
            }

            async function updateTable() {
                try {
                    const data = await fetchJSONP(API_URL);
                    const tbody = document.getElementById('live-data');
                    if (!tbody) return;

                    let html = "";
                    data.slice(0, 100).forEach(row => {
                        let waktu = new Date(row[0]);
                        let jam = "N/A";
                        if (!isNaN(waktu.getTime())) {
                            let dd = String(waktu.getDate()).padStart(2, '0');
                            let mm = String(waktu.getMonth() + 1).padStart(2, '0');
                            let yyyy = waktu.getFullYear();
                            let hh = String(waktu.getHours()).padStart(2, '0');
                            let min = String(waktu.getMinutes()).padStart(2, '0');
                            let ss = String(waktu.getSeconds()).padStart(2, '0');
                            jam = `${dd}/${mm}/${yyyy} ${hh}:${min}:${ss}`;
                        }
                        
                        html += `<tr class="fade-in row-new">
                            <td class="text-info" style="font-size: 0.75rem;">${jam}</td>
                            <td class="fw-bold">${row[1] || '-'}</td>
                            <td class="text-truncate" style="max-width: 150px;">${row[2] || '-'}</td>
                        </tr>`;
                    });
                    
                    tbody.style.opacity = 0;
                    tbody.innerHTML = html;
                    setTimeout(() => {
                        tbody.style.transition = "opacity 0.5s";
                        tbody.style.opacity = 1;
                    }, 50);
                } catch (err) {
                    console.error("Terjadi kesalahan:", err);
                }
            }
            
            setInterval(updateTable, 3000);
            updateTable();
        });

    document.addEventListener("DOMContentLoaded", function() {
    const elemenTeks = document.getElementById('teks-dashboard');
    const teks = elemenTeks.innerText;
    elemenTeks.innerHTML = ''; // Kosongkan teks asli

    // Pecah teks menjadi huruf-huruf tunggal
    teks.split('').forEach((huruf, index) => {
        let span = document.createElement('span');
        // Jika spasi, ubah jadi karakter spasi HTML agar tidak hilang
        span.innerHTML = huruf === ' ' ? '&nbsp;' : huruf; 
        
        // Kunci efek merambat: Delay bertambah 0.05 detik per huruf
        span.style.animationDelay = (index * 0.05) + 's'; 
        
        elemenTeks.appendChild(span);
    });
});
            </script>
</body>
</html>
