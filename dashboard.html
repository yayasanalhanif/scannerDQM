<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Kehadiran Peserta DQM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050a14; color: #e2e8f0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        
        .title-wrapper {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2) 0%, rgba(56, 189, 248, 0.1) 100%);
            border-left: 4px solid #0ea5e9;
            padding: 15px;
            margin-bottom: 20px;
        }

        .glass { background: rgba(17, 24, 39, 0.8); border: 1px solid #334155; border-radius: 5px; }
        
        /* Optimasi Tabel untuk HP */
        .table { color: #fff !important; font-size: 0.85rem; }
        .table thead { color: #0ea5e9; border-bottom: 2px solid #0ea5e9; }
        
        /* Menghilangkan scrollbar di HP agar lebih rapi */
        .table-responsive { overflow-x: auto; }
        
        /* Efek judul lebih kecil di HP */
        h2 { font-size: 1.25rem; margin: 0; }
    </style>
</head>
<body class="p-2">
    <div class="container-fluid">
        <div class="title-wrapper">
            <h2 class="text-uppercase">DAFTAR KEHADIRAN</h2>
        </div>

        <div class="glass p-3 shadow-lg">
            <div class="table-responsive">
                <table class="table table-hover table-sm">
                    <thead>
                        <tr><th>WAKTU</th><th>ID</th><th>NAMA</th></tr>
                    </thead>
                    <tbody id="live-data"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>

    const API_URL = "https://script.google.com/macros/s/AKfycbynIfrRtmKorvPGNg_S_2qf1_rijMiMJBYS779ter6Vg8kpEAqOcHUOCYQBr9JtA9LKaQ/exec?action=getData";
    
    // Fungsi khusus untuk menangani JSONP hasil dari Code.gs
    async function fetchJSONP(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };

            const script = document.createElement('script');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            document.body.appendChild(script);
        });
    }

    async function updateTable() {
        try {
            // Kita gunakan fungsi khusus di atas, bukan fetch biasa
            const data = await fetchJSONP(API_URL);
            
            let html = "";
            data.slice(0, 10).forEach(row => {
                html += `<tr>
                    <td class="text-info">${new Date(row[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td class="fw-bold">${row[1] || '-'}</td>
                    <td class="text-truncate" style="max-width: 150px;">${row[2] || '-'}</td>
                </tr>`;
            });
            document.getElementById('live-data').innerHTML = html;
        } catch (err) {
            console.error("Gagal ambil data:", err);
        }
    }
    
    setInterval(updateTable, 3000);
    updateTable();
</script>
</body>
</html>
