<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* FIX: Menambahkan display block dan memaksa ukuran */
        #reader { 
            width: 100% !important; 
            max-width: 500px !important; 
            margin: 0 auto; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            border: 3px solid #0d6efd; 
            position: relative; 
            min-height: 300px; /* Menjaga agar div tidak menciut */
            display: block !important;
        }

        #reader video {
            width: 100% !important;
            height: auto !important;
        }

        #reader::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255, 0, 0, 0.7); animation: scan 2s linear infinite; z-index: 10; display: none; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        #reader.scanning::after { display: block; }
        .table-container { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<audio id="sndSuccess" src="https://www.soundjay.com/buttons_c2026/beep-08b.mp3" preload="auto"></audio>
<audio id="sndError" src="https://www.soundjay.com/buttons_c2026/beep-09.mp3" preload="auto"></audio>

<div class="container py-4">
    <div class="card p-4 mx-auto" style="max-width: 500px;">
        <h4 class="text-center fw-bold text-primary mb-3">Absen Dauroh Qowa'idul Mudzaa'ah</h4>
        <input type="text" id="petugas" class="form-control mb-3" placeholder="Nama Petugas">
        <div id="reader"></div>
        <button id="start-btn" class="btn btn-primary w-100 mt-3 p-3 fw-bold">AKTIFKAN KAMERA</button>
        <div id="status" class="alert mt-3 d-none text-center fw-bold"></div>
        
        <hr>
        <h6>Riwayat Scan Terbaru:</h6>
        <div class="table-container">
            <table class="table table-sm table-striped">
                <thead><tr><th>Nama & ID</th><th class="text-end">Waktu</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbynIfrRtmKorvPGNg_S_2qf1_rijMiMJBYS779ter6Vg8kpEAqOcHUOCYQBr9JtA9LKaQ/exec"; 
    const html5QrCode = new Html5Qrcode("reader");
    const statusDiv = document.getElementById('status');
    const historyBody = document.getElementById('history-body');

    function playSound(isSuccess) {
        const audio = isSuccess ? document.getElementById('sndSuccess') : document.getElementById('sndError');
        audio.currentTime = 0; 
        audio.play().catch(e => console.log("Audio diblokir"));
    }

    function onScanSuccess(decodedText) {
        const petugas = document.getElementById('petugas').value;
        if(!petugas) { alert("Masukkan Nama Petugas!"); return; }

        html5QrCode.pause();
        document.getElementById('reader').classList.remove('scanning');
        statusDiv.innerText = "⏳ Memproses...";
        statusDiv.className = "alert mt-3 d-block alert-info";

        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ nomor: decodedText, petugas: petugas })
        })
        .then(res => res.text())
        .then(txt => {
            const isBerhasil = txt.toUpperCase().includes("BERHASIL");
            playSound(isBerhasil);

            statusDiv.innerHTML = `<div>${txt}</div><button class="btn btn-dark w-100 mt-2" onclick="resumeScanner()">OKE - LANJUT</button>`;
            statusDiv.className = `alert mt-3 d-block ${isBerhasil ? 'alert-success' : 'alert-danger'}`;
            
            if(isBerhasil) {
                const bagianRespon = txt.split(":")[1] ? txt.split(":")[1].trim() : "Peserta";
                const waktu = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                historyBody.innerHTML = `<tr><td><div class="fw-bold">${bagianRespon}</div></td><td class="text-end align-middle">${waktu}</td></tr>` + historyBody.innerHTML;
            }
        });
    }

    function resumeScanner() {
        statusDiv.className = "alert mt-3 d-none";
        document.getElementById('reader').classList.add('scanning');
        html5QrCode.resume();
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-btn').classList.add('d-none');
        // FIX: Konfigurasi qrbox yang lebih fleksibel untuk mobile
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => document.getElementById('reader').classList.add('scanning'));
    });
</script>
</body>
</html>
