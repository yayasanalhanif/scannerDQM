
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kartu Peserta V2.0</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
    <div class="container">
        <table id="tabelPeserta" class="table table-dark table-hover">
            <thead><tr><th>No</th><th>Nama</th><th>No Peserta</th></tr></thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        // GANTI INI: 
        const SPREADSHEET_ID = "1EsB1vj225nkuxA7Af2LBvlwTplFkOsUQOMdXjiQjVQg"; 
        const API_KEY = "AIzaSyAWKh1aF3RcIpAj2TzUNpXze3GLA-Z9cmI";
        
        const RANGE = "KartuPeserta!A2:C300"; // Sesuaikan range
        
        const URL = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;

        fetch(URL)
            .then(res => res.json())
            .then(res => {
                let html = "";
                res.values.forEach(row => {
                    html += `<tr><td>${row[0]||''}</td><td>${row[1]||''}</td><td>${row[2]||''}</td></tr>`;
                });
                document.getElementById('data-body').innerHTML = html;
                $('#tabelPeserta').DataTable();
            });
    </script>
</body>
</html>
