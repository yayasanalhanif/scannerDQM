<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Kartu Peserta</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        :root { --neon: #0ea5e9; --bg: #050a14; }
        body { background-color: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; }
        h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: var(--neon); text-transform: uppercase; }
        
        .container { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(15px); border: 1px solid #1e293b; border-radius: 15px; padding: 25px; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Tabel Elegan */
        .table { color: #fff !important; vertical-align: middle; }
        .table thead { background: rgba(14, 165, 233, 0.1); border-bottom: 2px solid var(--neon); }
        .table-hover tbody tr:hover { background: rgba(14, 165, 233, 0.05); }
        
        /* Mobile Responsif */
        @media (max-width: 768px) {
            .container { padding: 15px; border-radius: 0; }
            h2 { font-size: 1.2rem; }
        }
        
        /* Search Box Futuristik */
        .dataTables_filter input { background: #0f172a; border: 1px solid var(--neon); color: white; }
        .dataTables_length select { background: #0f172a; border: 1px solid var(--neon); color: white; }
    </style>
</head>
<body class="p-2 p-md-4">
    <div class="container">
        <h2 class="text-center mb-4">Kartu Peserta DQM</h2>
        <div class="table-responsive">
            <table id="tabelPeserta" class="table table-hover">
                <thead><tr><th>No</th><th>Nama</th><th>No Peserta</th></tr></thead>
                <tbody id="data-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        const SPREADSHEET_ID = "1EsB1vj225nkuxA7Af2LBvlwTplFkOsUQOMdXjiQjVQg"; 
        const API_KEY = "AIzaSyAWKh1aF3RcIpAj2TzUNpXze3GLA-Z9cmI";
        const RANGE = "KartuPeserta!A2:C300"; 
        const URL = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;

        fetch(URL)
            .then(res => res.json())
            .then(res => {
                let html = "";
                res.values.forEach(row => {
                    html += `<tr><td>${row[0]||''}</td><td>${row[1]||''}</td><td>${row[2]||''}</td></tr>`;
                });
                document.getElementById('data-body').innerHTML = html;
                
                $('#tabelPeserta').DataTable({
                    "language": { "search": "Cari Peserta:" },
                    "pageLength": 10
                });
            });
    </script>
</body>
</html>
