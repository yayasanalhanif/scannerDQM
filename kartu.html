
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Kartu Peserta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #333; --header-bg: #0d6efd; --text-white: #ffffff; }
        [data-theme="dark"] { --bg-body: #050a14; --bg-card: #111827; --text-main: #e2e8f0; --header-bg: #0ea5e9; }
        
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .container { background: var(--bg-card); border-radius: 12px; padding: 30px; margin-top: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn-theme { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--header-bg); }
        .table thead { background-color: var(--header-bg); color: var(--text-white); }
        .link-preview { text-decoration: none; color: var(--header-bg); font-weight: 600; }
    </style>
</head>
<body class="p-2 p-md-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Data Kartu Peserta</h2>
            <button id="theme-toggle" class="btn-theme"><i class="fas fa-moon"></i></button>
        </div>
        <div class="table-responsive">
            <table id="tabelPeserta" class="table table-hover table-striped">
                <thead><tr><th>Nama</th><th>No Peserta</th><th>Link Kartu</th></tr></thead>
                <tbody id="data-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        // Logika Tema
        const btn = document.getElementById('theme-toggle');
        btn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // Logika Data
        const SPREADSHEET_ID = "1EsB1vj225nkuxA7Af2LBvlwTplFkOsUQOMdXjiQjVQg"; 
        const API_KEY = "AIzaSyAWKh1aF3RcIpAj2TzUNpXze3GLA-Z9cmI";
        const RANGE = "Form Responses 1!A2:X300"; 
        const URL = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;

        // Di dalam script fetch kartu.html:
fetch(URL)
    .then(res => res.json())
    .then(res => {
        let html = "";
        // Kita loop dari index 1 (melewati header)
        res.values.forEach((row, index) => {
            // row[3] = Nama (Kolom D)
            // row[15] = No Peserta (Kolom P)
            // row[23] = Link (Kolom X)
            
            let link = row[23] || "#"; // Ambil link dari Kolom X
            
            html += `<tr>
                <td>${index + 1}</td>
                <td>${row[3] || ''}</td> 
                <td>
                    <a href="${link}" target="_blank" class="link-preview">
                        ${row[15] || 'Belum Ada No'}
                    </a>
                </td>
            </tr>`;
        });
        document.getElementById('data-body').innerHTML = html;
        
        // Inisialisasi DataTables setelah data di-render
        $('#tabelPeserta').DataTable({
            language: { /* ... (bahasa Indonesia seperti sebelumnya) ... */ }
        });
    });
    
    </script>
</body>
</html>
