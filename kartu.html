<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kartu Peserta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { background: #050a14; color: #e2e8f0; font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.9); border: 1px solid #334155; border-radius: 10px; padding: 20px; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter { color: #0ea5e9; margin-bottom: 15px; }
        table { color: white !important; }
        th { background: #0ea5e9 !important; color: white !important; }
    </style>
</head>
<body class="p-4">
    <div class="container glass">
        <h2 class="text-uppercase text-center mb-4 text-info">Kartu Peserta Dauroh</h2>
        <div class="table-responsive">
            <table id="tabelPeserta" class="table table-hover table-striped">
                <thead><tr><th>No</th><th>Nama</th><th>No Peserta</th></tr></thead>
                <tbody id="data-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbynIfrRtmKorvPGNg_S_2qf1_rijMiMJBYS779ter6Vg8kpEAqOcHUOCYQBr9JtA9LKaQ/exec?action=getData&sheet=KartuPeserta";
    
    // Pastikan fungsi ini ada di scope global agar bisa diakses oleh JSONP
    window.myCallback = function(data) {
        let tbody = document.getElementById('data-body');
        let html = "";
        
        data.forEach(row => {
            html += `<tr><td>${row[0]||''}</td><td>${row[1]||''}</td><td>${row[2]||''}</td></tr>`;
        });
        
        tbody.innerHTML = html;
        
        // Inisialisasi atau Refresh DataTables
        // Kita gunakan setTimeout untuk memberi waktu browser merender HTML sebelum tabel di-bind
        setTimeout(function() {
            if ($.fn.DataTable.isDataTable('#tabelPeserta')) {
                $('#tabelPeserta').DataTable().destroy();
            }
            $('#tabelPeserta').DataTable({
                "pageLength": 10,
                "lengthMenu": [10, 25, 50, 100, -1],
                "autoWidth": false
            });
        }, 100);
    }

    // Memanggil API dengan cara menyuntikkan tag script
    const script = document.createElement('script');
    script.src = API_URL + "&callback=myCallback";
    document.body.appendChild(script);
</script>
</body>
</html>
