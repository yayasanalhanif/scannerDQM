<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ujian Bertauhid</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .quiz-card { background: white; max-width: 650px; width: 100%; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 30px; }
        .question-box { border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        .points { position: absolute; top: 15px; right: 20px; color: #888; font-size: 0.8em; }
        .option { display: block; padding: 10px; border: 1px solid #ddd; border-radius: 20px; margin: 8px 0; cursor: pointer; }
        .option:hover { background: #f0f7ff; }
        button { background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        #result { display: none; text-align: center; }
        .score-big { font-size: 64px; color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>
<div class="quiz-card">
    <div id="quiz-form">
        <h2>Ujian Bertauhid</h2>
        <input type="email" id="email" placeholder="Email Anda" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px;" required>
        
            <div class="question-box">
                <span class="points">10 poin</span>
                <p><strong>1. kaki sapi ada</strong></p>
                <label class="option"><input type="radio" name="q1" value="A"> a. ada 2</label>
                <label class="option"><input type="radio" name="q1" value="B"> b. ada 3</label>
                <label class="option"><input type="radio" name="q1" value="C"> c. ada 4</label>
            </div>
            <div class="question-box">
                <span class="points">10 poin</span>
                <p><strong>2. rukun islam ada berapa</strong></p>
                <label class="option"><input type="radio" name="q2" value="A"> a. 1</label>
                <label class="option"><input type="radio" name="q2" value="B"> b. 2</label>
                <label class="option"><input type="radio" name="q2" value="C"> c. 3</label>
            </div>
        <button onclick="submitQuiz()">Kirim Jawaban</button>
    </div>
    <div id="result">
        <h2>Hasil Kuis</h2>
        <div class="score-big" id="final-score">0</div>
        <p>Jawaban Anda telah tersimpan.</p>
    </div>
</div>
<script>
    const answerKey = {
  "q1": {
    "ans": "C",
    "pts": 10
  },
  "q2": {
    "ans": "B",
    "pts": 10
  }
};
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwEbaSulQ6MWJk33cWmBAs8EPsN-xqoX2rpqZPnTQCl32cbFC7gfpQfE4xtxOdo2kDz/exec";

    function submitQuiz() {
        const email = document.getElementById('email').value;
        if(!email) return alert("Email wajib!");
        let score = 0; let res = {};
        for (let q in answerKey) {
            const sel = document.querySelector(`input[name="${q}"]:checked`);
            const val = sel ? sel.value : "-";
            res[q] = val;
            if(val === answerKey[q].ans) score += answerKey[q].pts;
        }
        document.getElementById('quiz-form').style.display='none';
        document.getElementById('result').style.display='block';
        document.getElementById('final-score').innerText = score;
        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ email: email, score: score, answers: res }) });
    }
</script>
</body>
</html>
